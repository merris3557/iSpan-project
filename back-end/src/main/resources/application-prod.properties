# =========================================================
# 1. Database Configuration (PostgreSQL)
# =========================================================
spring.datasource.url=${RENDER_POSTGRES_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# 建議保留這行就好，SQL Dialect 會由 Hibernate 自動偵測，或寫一行即可
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQL10Dialect

# 關鍵建表與初始化設定
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# 處理 PostgreSQL 大小寫敏感問題 (建議加上)
# spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# =========================================================
# 2. Third-Party Services (Render Env Variables)
# =========================================================
# 這裡建議直接映射到程式中使用的 Key
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
Mapbox.token=${MAPBOX_TOKEN}
Gmail.password=${GMAIL_PASSWORD}
GMAIL_USERNAME=${GMAIL_USERNAME}
JWT_SECRET=${JWT_SECRET}

# =========================================================
# 3. Application Logic & Seeder
# =========================================================
app.seeder.enabled=true

# =========================================================
# 4. System & Logging
# =========================================================
spring.main.banner-mode=off
logging.level.root=INFO

# 只有在部署失敗時才開啟 DEBUG，成功連線後建議改回 INFO 以節省 Log 額度
logging.level.org.springframework.jdbc=DEBUG
logging.level.org.hibernate.SQL=DEBUG