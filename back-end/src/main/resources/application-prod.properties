# Database Configuration (Render PostgreSQL)
# 這裡的變數名稱要跟你在 Render 後台設定的一致
spring.datasource.url=${RENDER_POSTGRES_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# --- 重要：補上其他元件所需的變數映射 ---
# 這些值我們等一下會在 Render 的後台設定，這裡只要定義對應關係即可
GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
Mapbox.token=${MAPBOX_TOKEN}
Gmail.password=${GMAIL_PASSWORD}
GMAIL_USERNAME=${GMAIL_USERNAME}
JWT_SECRET=${JWT_SECRET}

# 停用沒必要的 Spring Boot 啟動圖案
spring.main.banner-mode=off
# 減少日誌輸出量，節省資源
logging.level.root=INFO

# 強制顯示詳細的連線錯誤訊息
logging.level.org.springframework.jdbc=DEBUG
logging.level.org.hibernate.engine.jdbc.env.internal.JdbcEnvironmentInitiator=DEBUG